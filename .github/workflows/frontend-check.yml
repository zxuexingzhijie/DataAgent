name: Frontend Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Install dependencies
        run: |
          cd data-agent-frontend-nuxt
          pnpm install
      - name: Build project
        run: |
          cd data-agent-frontend-nuxt
          pnpm build
